---
# yamllint disable rule:truthy
name: CI Checks

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  check:
    name: Lint and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        env:
          GITHUB_API_TOKEN: dummy-for-ci-validation
        run: npm test

      - name: Verify application loads
        env:
          GITHUB_API_TOKEN: dummy-for-ci-validation
        run: node -e "import('./src/lib/mcp/server.js')"

      - name: Verify library entry point loads
        env:
          GITHUB_API_TOKEN: dummy-for-ci-validation
        run: node -e "import('./src/index.js').then(m => { if (typeof m.listItems !== 'function') throw new Error('library entry broken'); })"

      - name: Install Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1
        with:
          version: 'v3.21.3'

      - name: Lint Helm chart
        run: helm lint ./helm/pro
