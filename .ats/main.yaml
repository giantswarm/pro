# app-test-suite config for the generated `execute-chart-tests` CI job.
#
# All test steps are skipped: app-test-suite's smoke scenario runs pytest tests
# from `tests/ats`, which this repo does not yet have. Without that directory the
# job errors with "the configured test source code directory 'tests/ats' doesn't
# exist". Skipping keeps CI green while still validating that the chart packages
# cleanly via build-chart. Add `tests/ats` smoke scenarios and drop `smoke` from
# skip-steps to enable real deploy testing.
smoke-tests-cluster-type: kind
skip-steps: [smoke, functional, upgrade]
