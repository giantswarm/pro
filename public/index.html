<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Roadmap Analysis Tool</title>
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <!-- Our CSS -->
  <link rel="stylesheet" href="css/main.css">
</head>
<body>
  <div class="container">
    <h1 class="mb-4"><i class="bi bi-robot"></i> AI Roadmap Analysis Tool</h1>
    
    <!-- Tab Navigation -->
    <ul class="nav mb-4">
      <li><a class="nav-link active" href="#analyzeTab">AI Analysis</a></li>
      <li><a class="nav-link" href="#fixTab">Fix Empty Fields</a></li>
    </ul>
    
    <!-- Tab Content -->
    <div class="tab-content">
      <!-- AI Analysis Tab -->
      <div class="tab-pane active" id="analyzeTab">
        <div class="card">
          <div class="card-header">
            <h2>Generate AI Analysis</h2>
          </div>
          <div class="card-body">
            <div class="form-group">
              <label for="analysisTeam">Team (optional)</label>
              <select id="analysisTeam" class="form-select">
                <option value="">All Teams</option>
                <!-- Options will be populated by JavaScript -->
              </select>
            </div>
            <button id="generateAIAnalysis" class="btn btn-primary mt-3">
              <i class="bi bi-magic"></i> Generate AI Analysis
            </button>
            
            <!-- Analysis Results -->
            <div id="aiAnalysisResults" class="ai-analysis-results mt-4" style="display: none;">
              <h3>AI Analysis Results</h3>
              <div id="aiAnalysisSummary" class="ai-analysis-summary"></div>
            </div>
          </div>
        </div>
      </div>
      
      <!-- Fix Empty Fields Tab -->
      <div class="tab-pane" id="fixTab">
        <div class="card">
          <div class="card-header">
            <h2>Fix Empty Fields</h2>
          </div>
          <div class="card-body">
            <div class="form-group">
              <label for="fixTeam">Team (optional)</label>
              <select id="fixTeam" class="form-select">
                <option value="">All Teams</option>
                <!-- Options will be populated by JavaScript -->
              </select>
            </div>
            <div class="form-group mt-3">
              <label for="fixFieldType">Field Type</label>
              <select id="fixFieldType" class="form-select">
                <option value="">Select Field Type</option>
                <!-- Options will be populated by JavaScript -->
              </select>
            </div>
            <button id="findEmptyFields" class="btn btn-primary mt-3">
              <i class="bi bi-search"></i> Find Issues
            </button>
            
            <!-- Operation status message -->
            <div id="operationStatus" class="mt-3"></div>
            
            <!-- Issues Container -->
            <div id="issuesContainer" class="mt-4" style="display: none;">
              <div class="d-flex justify-content-between align-items-center mb-3">
                <h3>Issues with Empty Fields: <span id="foundCount">0</span></h3>
                <button id="startFixingBtn" class="btn btn-success">
                  <i class="bi bi-lightning-charge"></i> Start Fixing All
                </button>
              </div>
              
              <!-- Progress Container -->
              <div id="fixProgressContainer" class="fix-progress-container" style="display: none;">
                <div class="current-issue-info">
                  <div class="d-flex justify-content-between align-items-center mb-2">
                    <div>
                      <strong>Current Issue:</strong> 
                      <span id="currentIssueIndex">0</span> of <span id="totalIssues">0</span>
                    </div>
                    <div id="suggestionStatusMessage" class="suggestion-status" style="display: none;">
                      <span class="spinner-icon"><i class="bi bi-arrow-repeat rotate"></i></span>
                      <span id="statusText">Getting suggestion...</span>
                    </div>
                  </div>
                  <div>
                    <strong>#<span id="currentIssueNumber"></span>:</strong> 
                    <span id="currentIssueTitle"></span>
                  </div>
                </div>
                
                <!-- Progress Bar -->
                <div id="fixProgress" class="progress" style="display: none;">
                  <div id="fixProgressBar" class="progress-bar" role="progressbar" style="width: 0%"></div>
                </div>
                
                <!-- Fix Results -->
                <div id="fixResults" class="fix-results mt-2" style="display: none;">
                  <div>
                    <span class="stats-badge stats-fixed">
                      <i class="bi bi-check-circle"></i> Fixed: <span id="fixedCount">0</span>
                    </span>
                  </div>
                  <div>
                    <span class="stats-badge stats-skipped">
                      <i class="bi bi-skip-forward"></i> Skipped: <span id="skippedCount">0</span>
                    </span>
                  </div>
                  <div>
                    <span class="stats-badge stats-total">
                      <i class="bi bi-list-ol"></i> Total: <span id="totalCount">0</span>
                    </span>
                  </div>
                </div>
              </div>
              
              <!-- Issues Table -->
              <div class="table-responsive">
                <table class="table">
                  <thead>
                    <tr>
                      <th>Issue</th>
                      <th>Fields</th>
                      <th>Action</th>
                    </tr>
                  </thead>
                  <tbody id="issuesTableBody"></tbody>
                </table>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  
  <!-- Loading Overlay -->
  <div id="loadingOverlay" class="loading-overlay" style="display: none;">
    <div class="loading-content">
      <div class="spinner-border loading-spinner" role="status">
        <span class="visually-hidden">Loading...</span>
      </div>
      <div id="loadingMessage" class="loading-message">Loading...</div>
    </div>
  </div>
  
  <!-- Load JS as type="module" to use ES modules -->
  <script type="module" src="js/main.js"></script>
</body>
</html>
